<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>GDGoC - Registration Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="side-header">
        <h1>GDGoC - Hands On</h1>
    </header>

    <main class="container">
        <section class="card">
            <h2>About The Event</h2>
            <p>
                Build a event registration form
            </p>
        </section>
        <section class="card">
            <h2>Topic Covered</h2>
            <ul>
                <li>HTML: basic structure and semantic elements</li>
                <li>CSS : selectors, layout, and styling</li>
                <li>JavaScripts : DOM, events, functions, and arrays</li>
            </ul>
        </section>
        <section class="card">
            <h2>Event Registration</h2>
            <form action="" id="registration-form" class="form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your Full Name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="text" name="email" id="email" placeholder="Enter your Email" required>
                </div>

                <div class="form-group">
                    <label for="level">Experience Level</label>
                    <select name="level" id="level">
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                </div>

                <div class="form-group form-group-inline">
                    <label for="join-wa">
                        <input type="checkbox" name="join-wa" id="join-wa">
                        Join WhatsApp group
                    </label>
                </div>

                <button type="submit" class="btn-primary">
                    Register
                </button>

                <p id="error-message" class="message error"></p>
                <p id="success-message" class="message success"></p>
            </form>
        </section>

        <section class="card">
            <h2>Registered Participants</h2>
            <ul id="participants-list" class="participants-list">

            </ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
